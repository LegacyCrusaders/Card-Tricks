<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="sudokuG">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>sudokuG</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--border:#2e2e2e;--border-strong:#555;
  --text:#e8e8e8;--text-dim:#666;
  --accent:#4a9eff;--accent-bg:rgba(74,158,255,0.12);
  --peer:#1e1e1e;--user:#4a9eff;--error:#ff5a5a;
  --note:#888;--match-note:#ffd700;
  --pair-row:#f0a030;  --pair-row-glow:rgba(240,160,48,0.22);
  --pair-col:#30d0a0;  --pair-col-glow:rgba(48,208,160,0.22);
  --pair-box:#d060f0;  --pair-box-glow:rgba(208,96,240,0.22);
  --tri-row:#ff7a30;   --tri-row-glow:rgba(255,122,48,0.22);
  --tri-col:#30b8ff;   --tri-col-glow:rgba(48,184,255,0.22);
  --tri-box:#c0e040;   --tri-box-glow:rgba(192,224,64,0.22);
  --btn:#222;--btn-active:rgba(74,158,255,0.18);--btn-border:#333;
  --checkpoint:#ff9f43;--checkpoint-bg:rgba(255,159,67,0.15);
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;overflow:hidden;touch-action:manipulation}

/* ══════════════════════════════════════════
   DESKTOP / WIDE BROWSER  (≥ 700px wide, not a narrow phone)
   Grid left, controls right, centered in viewport
   ══════════════════════════════════════════ */
@media (min-width:700px){
  html,body{overflow:auto}
  #app{
    display:flex;flex-direction:row;align-items:flex-start;justify-content:center;
    min-height:100vh;padding:16px;gap:20px
  }
  #right-panel{display:flex;flex-direction:column;gap:6px;width:260px;flex-shrink:0;padding-top:0}
  #top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:4px}
  #grid-wrap{flex-shrink:0;width:min(500px, calc(100vh - 40px));aspect-ratio:1}
  #grid{display:grid;grid-template-columns:repeat(9,1fr);width:100%;height:100%;border:2px solid var(--border-strong)}
  #controls{display:flex;flex-direction:column;gap:5px;width:100%}
  #numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;width:100%}
  #msg{font-size:10px;color:var(--text-dim);text-align:left;min-height:14px}
  .cell{font-size:calc(min(500px,calc(100vh - 40px))/9*0.5)}
  .notes-g span{font-size:calc(min(500px,calc(100vh - 40px))/9*0.22)}
}

/* ══════════════════════════════════════════
   MOBILE PORTRAIT  (narrow screen, vertical)
   Everything stacked top-to-bottom
   ══════════════════════════════════════════ */
@media (max-width:699px) and (orientation:portrait){
  #app{
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    height:100dvh;padding:6px 4px;gap:4px
  }
  #right-panel{display:contents}
  #top-bar{display:flex;align-items:center;justify-content:space-between;width:min(calc(100vw - 8px),480px);flex-shrink:0}
  #grid-wrap{flex-shrink:0;width:min(calc(100vw - 8px),calc(100dvh - 230px));aspect-ratio:1}
  #grid{display:grid;grid-template-columns:repeat(9,1fr);width:100%;height:100%;border:2px solid var(--border-strong)}
  #controls{display:flex;flex-direction:column;gap:4px;width:min(calc(100vw - 8px),480px);flex-shrink:0}
  #numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;width:min(calc(100vw - 8px),480px);flex-shrink:0}
  #msg{font-size:10px;color:var(--text-dim);text-align:center;min-height:14px;flex-shrink:0}
  .cell{font-size:calc(min(calc(100vw - 8px),calc(100dvh - 230px))/9*0.5)}
  .notes-g span{font-size:calc(min(calc(100vw - 8px),calc(100dvh - 230px))/9*0.22)}
}

/* ══════════════════════════════════════════
   MOBILE LANDSCAPE  (narrow screen, horizontal)
   Grid left, controls right panel, scrollable
   ══════════════════════════════════════════ */
@media (max-width:699px) and (orientation:landscape){
  html,body{overflow:hidden}
  #app{
    display:flex;flex-direction:row;align-items:stretch;justify-content:center;
    height:100dvh;padding:4px;gap:6px
  }
  #grid-wrap{
    flex-shrink:0;
    height:100dvh;
    width:100dvh;
    max-width:55vw;
    aspect-ratio:1;
    align-self:center
  }
  #grid{display:grid;grid-template-columns:repeat(9,1fr);width:100%;height:100%;border:2px solid var(--border-strong)}
  #right-panel{
    display:flex;flex-direction:column;justify-content:flex-start;
    flex:1;min-width:0;
    gap:3px;overflow-y:auto;padding:2px 0;-webkit-overflow-scrolling:touch
  }
  #top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;flex-shrink:0}
  #controls{display:flex;flex-direction:column;gap:3px;width:100%;flex-shrink:0}
  #numpad{
    display:grid;grid-template-columns:repeat(9,1fr);
    gap:3px;width:100%;flex-shrink:0
  }
  #msg{font-size:10px;color:var(--text-dim);text-align:left;min-height:14px;flex-shrink:0}
  .cell{font-size:calc(min(55vw, 100dvh)/9*0.5)}
  .notes-g span{font-size:calc(min(55vw, 100dvh)/9*0.22)}
  .btn{font-size:10px;padding:4px 5px}
  .row-label{font-size:8px}
}

#title{font-size:11px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase}
#timer{font-size:12px;letter-spacing:.1em;color:var(--text-dim);font-variant-numeric:tabular-nums}
.cell{border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-weight:600;color:var(--text);transition:background .08s;-webkit-tap-highlight-color:transparent}
.cell:nth-child(3n+1){border-left:1.5px solid var(--border-strong)}
.cell:nth-child(n+1):nth-child(-n+9){border-top:1.5px solid var(--border-strong)}
.cell:nth-child(n+28):nth-child(-n+36){border-top:1.5px solid var(--border-strong)}
.cell:nth-child(n+55):nth-child(-n+63){border-top:1.5px solid var(--border-strong)}
.cell.selected{background:var(--accent-bg)!important}
.cell.peer{background:var(--peer)}
.cell.match{background:rgba(255,220,0,0.22)!important}
.cell.user-digit{color:var(--user)}
.cell.error{background:rgba(255,90,90,0.22)!important;color:var(--error)!important}
.cell.tagged-pair-row{box-shadow:inset 0 0 0 2px var(--pair-row);background:var(--pair-row-glow)}
.cell.tagged-pair-col{box-shadow:inset 0 0 0 2px var(--pair-col);background:var(--pair-col-glow)}
.cell.tagged-pair-box{box-shadow:inset 0 0 0 2px var(--pair-box);background:var(--pair-box-glow)}
.cell.tagged-tri-row{box-shadow:inset 0 0 0 2px var(--tri-row);background:var(--tri-row-glow)}
.cell.tagged-tri-col{box-shadow:inset 0 0 0 2px var(--tri-col);background:var(--tri-col-glow)}
.cell.tagged-tri-box{box-shadow:inset 0 0 0 2px var(--tri-box);background:var(--tri-box-glow)}
.cell.hint-pivot{box-shadow:inset 0 0 0 2px #9b6fff;background:rgba(155,111,255,0.18)!important}
.cell.hint-wing{box-shadow:inset 0 0 0 2px #ff6fa0;background:rgba(255,111,160,0.15)!important}
.notes-g{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:100%;height:100%;padding:1px}
.notes-g span{display:flex;align-items:center;justify-content:center;color:var(--note);font-weight:400;line-height:1}
.notes-g span.pair-note-row{color:var(--pair-row);font-weight:700}
.notes-g span.pair-note-col{color:var(--pair-col);font-weight:700}
.notes-g span.pair-note-box{color:var(--pair-box);font-weight:700}
.notes-g span.tri-note-row{color:var(--tri-row);font-weight:700}
.notes-g span.tri-note-col{color:var(--tri-col);font-weight:700}
.notes-g span.tri-note-box{color:var(--tri-box);font-weight:700}
.notes-g span.match-note{color:var(--match-note);font-weight:700}
.notes-g span.hint-note{color:#9b6fff;font-weight:700}
.row-label{font-size:9px;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;text-align:center}
.btn-row{display:flex;gap:3px;justify-content:center;flex-wrap:nowrap}
.btn{background:var(--btn);border:.5px solid var(--btn-border);color:var(--text);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;flex:1;text-align:center;transition:background .1s;-webkit-tap-highlight-color:transparent;min-width:0}
.btn:active{transform:scale(.96)}
.btn.active{background:var(--btn-active);border-color:var(--accent);color:var(--accent)}
.btn.notes-all-active{background:rgba(74,158,255,0.25);border-color:var(--accent);color:var(--accent);font-weight:700}
.btn.tag-pair{border-color:var(--pair-row);color:var(--pair-row)}
.btn.tag-triple{border-color:var(--tri-col);color:var(--tri-col)}
.btn.hint-style{border-color:#9b6fff;color:#9b6fff}
.btn.hint-style:active{background:rgba(155,111,255,0.15)}
.btn.undo-style{border-color:#888;color:#aaa}
.btn.check-style{border-color:#4caf7a;color:#4caf7a}
.btn.check-style:active{background:rgba(76,175,122,0.15)}
.btn.checkpoint-style{border-color:var(--checkpoint);color:var(--checkpoint)}
.btn.checkpoint-style:active{background:var(--checkpoint-bg)}
.btn.checkpoint-style.has-checkpoint{background:var(--checkpoint-bg);font-weight:700}
.btn.restore-style{border-color:var(--checkpoint);color:var(--checkpoint);opacity:0.4;pointer-events:none}
.btn.restore-style.has-checkpoint{opacity:1;pointer-events:auto}
#numpad button{background:var(--btn);border:.5px solid var(--btn-border);color:var(--text);border-radius:6px;padding:8px 0;cursor:pointer;font-size:16px;font-family:inherit;font-weight:600;transition:background .1s;-webkit-tap-highlight-color:transparent}
#numpad button:active{transform:scale(.93);background:var(--accent-bg)}
#numpad button.notes-all-btn{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
#modal,#splash{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
#modal.open,#splash.open{display:flex}
#modal-box{background:#1a1a1a;border:1px solid #444;border-radius:10px;padding:20px;text-align:center;width:min(280px,90vw);display:flex;flex-direction:column;gap:12px}
#modal-box h3{font-size:13px;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase}
.diff-btn{background:#222;border:.5px solid #444;color:var(--text);border-radius:6px;padding:10px;font-family:inherit;font-size:13px;cursor:pointer}
.diff-btn:active{transform:scale(.97)}
.diff-btn:hover{background:#2a2a2a}
.diff-btn .sub{font-size:10px;color:var(--text-dim);display:block;margin-top:2px}
#modal-cancel{font-size:11px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit}
#splash-box{display:flex;flex-direction:column;align-items:center;gap:24px}
#splash-title{font-size:52px;font-weight:700;letter-spacing:.08em;color:var(--accent)}
#splash-sub{font-size:11px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;text-align:center}
#splash-tap{font-size:12px;color:var(--text-dim);letter-spacing:.15em;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-dim);font-size:12px;letter-spacing:.1em}
#loading-overlay.open{display:flex}
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <div id="title">sudokuG</div>
    <div id="timer">0:00</div>
  </div>
  <div id="grid-wrap"><div id="grid"></div></div>

  <!-- right-panel: in portrait = display:contents (flat), in landscape = flex column -->
  <div id="right-panel">
    <div id="controls">
      <div class="row-label">Input mode</div>
      <div class="btn-row">
        <button class="btn active" id="btn-digit" onclick="setMode('digit')">Digit</button>
        <button class="btn" id="btn-notes" onclick="cycleNotes()">Notes</button>
        <button class="btn" onclick="eraseCell()">Erase</button>
        <button class="btn undo-style" onclick="undo()">Undo</button>
        <button class="btn check-style" onclick="checkSolution()">Check</button>
        <button class="btn" onclick="openModal()">New</button>
      </div>
      <div class="row-label">Notes tools</div>
      <div class="btn-row">
        <button class="btn" onclick="autoNotes('all')">Auto All</button>
        <button class="btn" onclick="autoNotes('peers')">Peers</button>
        <button class="btn" onclick="clearAllNotes()">Clear Notes</button>
      </div>
      <div class="row-label">Auto-notes scope</div>
      <div class="btn-row">
        <button class="btn" onclick="autoNotes('row')">Row</button>
        <button class="btn" onclick="autoNotes('col')">Col</button>
        <button class="btn" onclick="autoNotes('box')">Box</button>
      </div>
      <div class="row-label">Proof by contradiction</div>
      <div class="btn-row">
        <button class="btn checkpoint-style" id="btn-checkpoint" onclick="setCheckpoint()">📍 Set Point</button>
        <button class="btn restore-style" id="btn-restore" onclick="restoreCheckpoint()">↩ Restore</button>
        <button class="btn undo-style" onclick="clearCheckpoint()" style="font-size:10px">✕ Clear</button>
      </div>
      <div class="row-label">Tag pairs &amp; triples</div>
      <div class="btn-row">
        <button class="btn tag-pair" onclick="tagSet(2)">Tag Pair</button>
        <button class="btn tag-pair" onclick="untagSet(2)">Untag Pair</button>
        <button class="btn tag-triple" onclick="tagSet(3)">Tag Triple</button>
        <button class="btn tag-triple" onclick="untagSet(3)">Untag Triple</button>
      </div>
      <div class="row-label">Hint — highlight technique</div>
      <div class="btn-row">
        <button class="btn hint-style" onclick="hintFind('pairs')">Pairs</button>
        <button class="btn hint-style" onclick="hintFind('triples')">Triples</button>
        <button class="btn hint-style" onclick="hintFind('xwing')">X-Wing</button>
        <button class="btn hint-style" onclick="hintFind('xywing')">XY-Wing</button>
        <button class="btn hint-style" onclick="clearHints()">Clear</button>
      </div>
    </div>
    <div id="numpad"></div>
    <div id="msg"></div>
  </div>
</div>

<div id="splash" class="open">
  <div id="splash-box">
    <div id="splash-title">sudokuG</div>
    <div id="splash-sub">smart notes · pair tagging · hints</div>
    <div id="splash-tap">tap to start</div>
  </div>
</div>

<div id="modal">
  <div id="modal-box">
    <h3>New Game</h3>
    <button class="diff-btn" onclick="startNew('easy')">Easy<span class="sub">single candidates only</span></button>
    <button class="diff-btn" onclick="startNew('medium')">Medium<span class="sub">basic logic required</span></button>
    <button class="diff-btn" onclick="startNew('hard')">Hard<span class="sub">advanced techniques</span></button>
    <button class="diff-btn" onclick="startNew('expert')">Expert<span class="sub">fiendish — good luck</span></button>
    <button id="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div id="loading-overlay"><div>fetching puzzle...</div></div>

<script>
const FALLBACK={
  easy:["530070000600195000098000060800060003400803001700020006060000280000419005000080079","200070038000006070300040600008020700100000003007030400004080009060700000730060001"],
  medium:["000000907000420180000705026100904000050000040000507009920108000034059000507000000","040700000060010070007030014001040500030000090004090200690080100080050060000009020"],
  hard:["000006000059000008200008000045000000003000600000003054000325006000000000000070830","010020300009005040860000000000100008070000050900003000000000081050800700003090020"],
  expert:["800000000003600000070090200060005300004000098000000070000504060050008000000000000","000000010400000000020000000000050407008000300001090000300400200050100000000806000"]
};

async function fetchPuzzle(diff){
  const apiDiff=diff==='expert'?'hard':diff;
  const maxTries=diff==='expert'?6:1;
  let lastFlat;
  for(let t=0;t<maxTries;t++){
    const res=await fetch('https://sugoku.onrender.com/board?difficulty='+apiDiff);
    if(!res.ok) throw new Error('API error');
    const data=await res.json();
    lastFlat=data.board.flat();
    const givens=lastFlat.filter(v=>v!==0).length;
    if(diff!=='expert'||givens<=23) return lastFlat;
  }
  return lastFlat;
}

let PUZZLE=[],mode='digit',selected=null,cells=[],notes=[],digits=[];
let taggedSets=[];
let history=[],flashError=new Set();
let timerSec=0,timerInterval=null,timerStarted=false;
let hintPivots=new Set(),hintWings=new Set(),hintNotes=new Map();
let notesAllMode=false;

// Checkpoint state for proof-by-contradiction
let checkpoint=null; // {digits, notes, taggedSets, timerSec}

const grid=document.getElementById('grid');
const numpad=document.getElementById('numpad');
const msg=document.getElementById('msg');
const loadingOverlay=document.getElementById('loading-overlay');
const splash=document.getElementById('splash');

splash.addEventListener('click',async()=>{
  try{
    if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
    else if(document.documentElement.webkitRequestFullscreen) await document.documentElement.webkitRequestFullscreen();
  }catch(e){}
  splash.classList.remove('open');
});

function showMsg(t,ms=2200){msg.textContent=t;clearTimeout(showMsg._t);showMsg._t=setTimeout(()=>msg.textContent='',ms)}
function rowOf(i){const r=Math.floor(i/9),s=new Set();for(let c=0;c<9;c++)s.add(r*9+c);return s}
function colOf(i){const c=i%9,s=new Set();for(let r=0;r<9;r++)s.add(r*9+c);return s}
function boxOf(i){const r=Math.floor(i/9),c=i%9,br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3,s=new Set();for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)s.add((br+dr)*9+(bc+dc));return s}
function peers(i){const s=new Set([...rowOf(i),...colOf(i),...boxOf(i)]);s.delete(i);return s}
function possibleFor(i){const used=new Set();peers(i).forEach(j=>{if(digits[j])used.add(digits[j])});const p=new Set();for(let n=1;n<=9;n++)if(!used.has(n))p.add(n);return p}
function clearFlash(){flashError.clear()}
function sees(a,b){return a!==b&&([...rowOf(a)].includes(b)||[...colOf(a)].includes(b)||[...boxOf(a)].includes(b))}
function combinations(arr,k){if(k===0)return[[]];if(arr.length<k)return[];const[first,...rest]=arr;return[...combinations(rest,k-1).map(c=>[first,...c]),...combinations(rest,k)]}

function startTimer(){clearInterval(timerInterval);timerInterval=null;timerSec=0;timerStarted=false;updateTimerDisplay()}
function startTimerOnce(){if(timerStarted)return;timerStarted=true;timerInterval=setInterval(()=>{timerSec++;updateTimerDisplay()},1000)}
function stopTimer(){clearInterval(timerInterval);timerInterval=null}
function updateTimerDisplay(){const m=Math.floor(timerSec/60),s=String(timerSec%60).padStart(2,'0');document.getElementById('timer').textContent=m+':'+s}

function snapshot(){
  history.push({digits:[...digits],notes:notes.map(s=>new Set(s)),taggedSets:JSON.parse(JSON.stringify(taggedSets))});
  if(history.length>200)history.shift();
}
function undo(){
  if(!history.length){showMsg('Nothing to undo');return}
  clearFlash();
  const s=history.pop();
  digits=[...s.digits];notes=s.notes.map(n=>new Set(n));taggedSets=s.taggedSets;
  render();
}

// ── Checkpoint (proof-by-contradiction) ──────────────────
function updateCheckpointUI(){
  const has=checkpoint!==null;
  document.getElementById('btn-checkpoint').classList.toggle('has-checkpoint',has);
  document.getElementById('btn-restore').classList.toggle('has-checkpoint',has);
}
function setCheckpoint(){
  checkpoint={
    digits:[...digits],
    notes:notes.map(s=>new Set(s)),
    taggedSets:JSON.parse(JSON.stringify(taggedSets)),
    timerSec
  };
  updateCheckpointUI();
  showMsg('📍 Checkpoint set — play on; restore if contradiction found',3000);
}
function restoreCheckpoint(){
  if(!checkpoint){showMsg('No checkpoint set');return}
  clearFlash();
  digits=[...checkpoint.digits];
  notes=checkpoint.notes.map(s=>new Set(s));
  taggedSets=JSON.parse(JSON.stringify(checkpoint.taggedSets));
  timerSec=checkpoint.timerSec;
  updateTimerDisplay();
  // keep checkpoint alive so you can try the other branch
  showMsg('↩ Restored to checkpoint — try the other candidate',3000);
  render();
}
function clearCheckpoint(){
  checkpoint=null;
  updateCheckpointUI();
  showMsg('Checkpoint cleared');
}

// ── Notes cycling ────────────────────────────────────────
function cycleNotes(){
  if(mode==='digit') setMode('notes');
  else if(mode==='notes') setMode('notes-all');
  else setMode('digit');
}
function setMode(m){
  mode=m;notesAllMode=m==='notes-all';
  document.getElementById('btn-digit').classList.toggle('active',m==='digit');
  const nb=document.getElementById('btn-notes');
  nb.classList.toggle('active',m==='notes');
  nb.classList.toggle('notes-all-active',m==='notes-all');
  nb.textContent=m==='notes-all'?'Notes*':'Notes';
  [...numpad.querySelectorAll('button')].forEach(b=>b.classList.toggle('notes-all-btn',notesAllMode));
  if(m==='notes-all') showMsg('Notes-All mode: number marks all valid cells',3000);
}

function isTagged(i){return taggedSets.some(t=>t.indices.includes(i))}
function pruneNoteFromPeers(i,n){peers(i).forEach(j=>{if(!isTagged(j))notes[j].delete(n)})}
function isImpossible(i,n){return[...peers(i)].some(j=>digits[j]===n)}

function inputNum(n){
  clearFlash();startTimerOnce();
  if(notesAllMode){
    snapshot();
    let count=0;
    for(let i=0;i<81;i++){
      if(PUZZLE[i]||digits[i]||isTagged(i)) continue;
      if(!isImpossible(i,n)){notes[i].add(n);count++;}
    }
    showMsg('Marked '+n+' as candidate in '+count+' cells');
    render();return;
  }
  if(selected===null||PUZZLE[selected]) return;
  if(mode==='digit'){
    snapshot();
    const placing=digits[selected]!==n?n:0;
    digits[selected]=placing;
    notes[selected].clear();
    if(placing){
      pruneNoteFromPeers(selected,placing);
      [...peers(selected)].forEach(j=>{if(digits[j]===placing)flashError.add(j)});
      if([...peers(selected)].some(j=>digits[j]===placing))flashError.add(selected);
    }
  } else {
    if(!notes[selected].has(n)&&isImpossible(selected,n)){
      flashError.add(selected);showMsg('Already in this row, column, or box');render();return;
    }
    snapshot();
    notes[selected].has(n)?notes[selected].delete(n):notes[selected].add(n);
  }
  render();
}

function eraseCell(){
  if(selected===null||PUZZLE[selected])return;
  clearFlash();startTimerOnce();snapshot();
  digits[selected]=0;notes[selected].clear();render();
}

// ── Clear all notes ───────────────────────────────────────
function clearAllNotes(){
  clearFlash();startTimerOnce();snapshot();
  for(let i=0;i<81;i++) notes[i].clear();
  showMsg('All notes cleared');
  render();
}

function selectCell(i){clearFlash();selected=i;render()}

function autoNotes(scope){
  let targets;
  if(scope==='all') targets=[...Array(81).keys()];
  else if(scope==='row') targets=selected!==null?[...rowOf(selected)]:[];
  else if(scope==='col') targets=selected!==null?[...colOf(selected)]:[];
  else if(scope==='box') targets=selected!==null?[...boxOf(selected)]:[];
  else if(scope==='peers') targets=selected!==null?[...peers(selected)]:[];
  if(!targets.length){showMsg('Select a cell first');return}
  clearFlash();startTimerOnce();snapshot();
  targets.forEach(i=>{if(isTagged(i)||PUZZLE[i]||digits[i])return;notes[i]=possibleFor(i)});
  render();
}

function tagSet(size){
  if(selected===null){showMsg('Select a cell first');return}
  const n=notes[selected];
  const label=size===2?'pair':'triple';
  if(size===2){
    if(n.size!==2){showMsg('Cell needs exactly 2 notes for a pair');return}
    const[a,b]=[...n];
    let partner=null,gType=null;
    for(const[groupFn,gt] of [[rowOf,'row'],[colOf,'col'],[boxOf,'box']]){
      for(const j of groupFn(selected)){
        if(j===selected) continue;
        if(notes[j].size===2&&notes[j].has(a)&&notes[j].has(b)){partner=j;gType=gt;break}
      }
      if(partner!==null) break;
    }
    if(partner===null){showMsg('No matching pair in same row/col/box');return}
    clearFlash();startTimerOnce();snapshot();
    taggedSets.push({size:2,groupType:gType,indices:[selected,partner]});
    showMsg('Pair tagged ('+gType+')');render();
  } else {
    if(n.size<1||n.size>3){showMsg('Cell must have 1-3 notes for a triple');return}
    let found=false;
    for(const[groupFn,gt] of [[rowOf,'row'],[colOf,'col'],[boxOf,'box']]){
      const grp=[...groupFn(selected)].filter(j=>j!==selected&&!digits[j]&&!PUZZLE[j]&&notes[j].size>=1&&notes[j].size<=3);
      for(const[p1,p2] of combinations(grp,2)){
        const union=new Set([...n,...notes[p1],...notes[p2]]);
        if(union.size===3){
          clearFlash();startTimerOnce();snapshot();
          taggedSets.push({size:3,groupType:gt,indices:[selected,p1,p2]});
          showMsg('Triple tagged ('+gt+')');render();found=true;break;
        }
      }
      if(found) break;
    }
    if(!found) showMsg('No matching triple in same row/col/box');
  }
}

function untagSet(size){
  if(selected===null){showMsg('Select a cell first');return}
  const idx=taggedSets.findIndex(t=>t.size===size&&t.indices.includes(selected));
  if(idx===-1){showMsg('Cell is not part of a tagged '+(size===2?'pair':'triple'));return}
  clearFlash();startTimerOnce();snapshot();taggedSets.splice(idx,1);render();
}

function tagClass(i){
  for(const t of taggedSets){if(t.indices.includes(i))return 'tagged-'+(t.size===2?'pair':'tri')+'-'+t.groupType}
  return '';
}
function noteTagClass(i){
  for(const t of taggedSets){if(t.indices.includes(i))return (t.size===2?'pair':'tri')+'-note-'+t.groupType}
  return '';
}

function checkSolution(){
  if(digits.some(d=>!d)){showMsg('Puzzle not complete yet');return}
  const valid=digits.every((d,i)=>d&&![...peers(i)].some(j=>digits[j]===d));
  if(valid){stopTimer();const m=Math.floor(timerSec/60),s=String(timerSec%60).padStart(2,'0');showMsg('Solved! Time: '+m+':'+s,6000);}
  else showMsg('Something is wrong — check red cells');
}

function render(){
  const peerSet=selected!==null?peers(selected):new Set();
  const selVal=selected!==null?digits[selected]:0;
  cells.forEach((el,i)=>{
    let cls='cell';
    if(PUZZLE[i]) cls+=' given';
    else if(digits[i]) cls+=' user-digit';
    if(flashError.has(i)) cls+=' error';
    else if(i===selected) cls+=' selected';
    else if(peerSet.has(i)) cls+=' peer';
    if(!flashError.has(i)&&selVal&&digits[i]===selVal&&i!==selected) cls+=' match';
    const tc=tagClass(i);if(tc) cls+=' '+tc;
    if(hintPivots.has(i)) cls+=' hint-pivot';
    if(hintWings.has(i))  cls+=' hint-wing';
    el.className=cls;
    const d=digits[i],nt=notes[i];
    if(d){el.innerHTML=d;}
    else if(nt.size>0){
      const ng=document.createElement('div');ng.className='notes-g';
      const ntc=noteTagClass(i);
      for(let k=1;k<=9;k++){
        const sp=document.createElement('span');
        if(nt.has(k)){
          sp.textContent=k;
          if(ntc) sp.className=ntc;
          else if(hintNotes.has(i)&&hintNotes.get(i).has(k)) sp.className='hint-note';
          else if(selVal&&k===selVal) sp.className='match-note';
        }
        ng.appendChild(sp);
      }
      el.innerHTML='';el.appendChild(ng);
    } else el.innerHTML='';
  });
}

function buildGrid(){
  grid.innerHTML='';cells=[];
  for(let i=0;i<81;i++){
    const el=document.createElement('div');
    el.className='cell'+(PUZZLE[i]?' given':'');
    el.addEventListener('click',()=>selectCell(i));
    grid.appendChild(el);cells.push(el);
  }
  render();
}
function buildNumpad(){
  numpad.innerHTML='';
  for(let n=1;n<=9;n++){
    const b=document.createElement('button');
    b.textContent=n;b.onclick=()=>inputNum(n);
    numpad.appendChild(b);
  }
}

function openModal(){document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}

async function startNew(diff){
  closeModal();loadingOverlay.classList.add('open');
  let puzzleArr;
  try{puzzleArr=await fetchPuzzle(diff);}
  catch(e){
    const bank=FALLBACK[diff];
    const str=bank[Math.floor(Math.random()*bank.length)];
    puzzleArr=str.split('').map(Number);
    showMsg('Offline — using local puzzle');
  }
  loadingOverlay.classList.remove('open');
  PUZZLE=[...puzzleArr];digits=[...PUZZLE];
  notes=Array.from({length:81},()=>new Set());
  taggedSets=[];hintPivots=new Set();hintWings=new Set();hintNotes=new Map();
  history=[];selected=null;flashError.clear();
  checkpoint=null;updateCheckpointUI();
  if(mode!=='digit')setMode('digit');
  buildGrid();startTimer();
  if(!msg.textContent) showMsg(diff.charAt(0).toUpperCase()+diff.slice(1)+' puzzle loaded');
}

// Hints
function clearHints(){hintPivots.clear();hintWings.clear();hintNotes.clear();render();showMsg('Hints cleared')}
function hintFind(type){
  clearHints();
  if(type==='pairs') findNakedSets(2);
  else if(type==='triples') findNakedSets(3);
  else if(type==='xwing') findXWing();
  else if(type==='xywing') findXYWing();
  render();
}

function findNakedSets(n){
  const groups=[];
  for(let i=0;i<9;i++){
    groups.push([...rowOf(i*9)]);
    groups.push([...colOf(i)]);
    groups.push([...boxOf(Math.floor(i/3)*27+(i%3)*3)]);
  }
  let found=false;
  for(const grp of groups){
    const empties=grp.filter(i=>!digits[i]&&!PUZZLE[i]&&notes[i].size>=2&&notes[i].size<=n);
    for(const combo of combinations(empties,n)){
      const union=new Set(combo.flatMap(i=>[...notes[i]]));
      if(union.size===n){
        combo.forEach(i=>{hintPivots.add(i);hintNotes.set(i,new Set(union))});found=true;
      }
    }
  }
  if(!found) showMsg(n===2?'No naked pairs found':'No naked triples found');
  else showMsg((n===2?'Naked pairs':'Naked triples')+' highlighted in purple');
}

function findXWing(){
  let found=false;
  for(let d=1;d<=9;d++){
    const rowCands=[];
    for(let r=0;r<9;r++){
      const cols=[...rowOf(r*9)].filter(i=>!digits[i]&&notes[i].has(d)).map(i=>i%9);
      if(cols.length===2) rowCands.push({r,cols});
    }
    for(let a=0;a<rowCands.length;a++) for(let b=a+1;b<rowCands.length;b++){
      if(rowCands[a].cols[0]===rowCands[b].cols[0]&&rowCands[a].cols[1]===rowCands[b].cols[1]){
        const[c1,c2]=[rowCands[a].cols[0],rowCands[a].cols[1]],[r1,r2]=[rowCands[a].r,rowCands[b].r];
        [[r1,c1],[r1,c2],[r2,c1],[r2,c2]].forEach(([r,c])=>{const idx=r*9+c;hintPivots.add(idx);if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)});
        for(let r=0;r<9;r++) if(r!==r1&&r!==r2)[c1,c2].forEach(c=>{const idx=r*9+c;if(!digits[idx]&&notes[idx].has(d)){hintWings.add(idx);if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)}});
        found=true;
      }
    }
    const colCands=[];
    for(let c=0;c<9;c++){
      const rows=[...colOf(c)].filter(i=>!digits[i]&&notes[i].has(d)).map(i=>Math.floor(i/9));
      if(rows.length===2) colCands.push({c,rows});
    }
    for(let a=0;a<colCands.length;a++) for(let b=a+1;b<colCands.length;b++){
      if(colCands[a].rows[0]===colCands[b].rows[0]&&colCands[a].rows[1]===colCands[b].rows[1]){
        const[r1,r2]=[colCands[a].rows[0],colCands[a].rows[1]],[c1,c2]=[colCands[a].c,colCands[b].c];
        [[r1,c1],[r1,c2],[r2,c1],[r2,c2]].forEach(([r,c])=>{const idx=r*9+c;hintPivots.add(idx);if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)});
        for(let c=0;c<9;c++) if(c!==c1&&c!==c2)[r1,r2].forEach(r=>{const idx=r*9+c;if(!digits[idx]&&notes[idx].has(d)){hintWings.add(idx);if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)}});
        found=true;
      }
    }
  }
  if(!found) showMsg('No X-Wings found in notes');
  else showMsg('X-Wing: purple=pattern, pink=eliminations');
}

function findXYWing(){
  const bi=[];
  for(let i=0;i<81;i++) if(!digits[i]&&!PUZZLE[i]&&notes[i].size===2) bi.push(i);
  let found=false;
  for(const pivot of bi){
    const[x,y]=[...notes[pivot]];
    for(const w1 of bi){
      if(w1===pivot||!sees(pivot,w1)) continue;
      const w1n=[...notes[w1]];
      if(!w1n.includes(x)&&!w1n.includes(y)) continue;
      for(const[shared1,z] of [[x,w1n.find(v=>v!==x)],[y,w1n.find(v=>v!==y)]]){
        if(z===undefined||z===shared1) continue;
        for(const w2 of bi){
          if(w2===pivot||w2===w1||!sees(pivot,w2)) continue;
          const other=shared1===x?y:x;
          if(notes[w2].has(other)&&notes[w2].has(z)){
            hintPivots.add(pivot);hintPivots.add(w1);hintPivots.add(w2);
            [pivot,w1,w2].forEach(i=>{if(!hintNotes.has(i))hintNotes.set(i,new Set());notes[i].forEach(v=>hintNotes.get(i).add(v))});
            for(let i=0;i<81;i++){
              if(hintPivots.has(i)||digits[i]) continue;
              if(sees(w1,i)&&sees(w2,i)&&notes[i].has(z)){hintWings.add(i);if(!hintNotes.has(i))hintNotes.set(i,new Set());hintNotes.get(i).add(z)}
            }
            found=true;
          }
        }
      }
    }
  }
  if(!found) showMsg('No XY-Wings found in notes');
  else showMsg('XY-Wing: purple=pattern, pink=eliminations');
}

document.addEventListener('keydown',e=>{
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){undo();return}
  const n=parseInt(e.key);
  if(n>=1&&n<=9){inputNum(n);return}
  if(e.key==='Backspace'||e.key==='Delete'){eraseCell();return}
  if(e.key==='d'||e.key==='D') setMode('digit');
  if(e.key==='n'||e.key==='N') cycleNotes();
  if(selected!==null){
    const r=Math.floor(selected/9),c=selected%9;
    if(e.key==='ArrowRight'&&c<8){clearFlash();selected++;render();e.preventDefault()}
    if(e.key==='ArrowLeft'&&c>0){clearFlash();selected--;render();e.preventDefault()}
    if(e.key==='ArrowDown'&&r<8){clearFlash();selected+=9;render();e.preventDefault()}
    if(e.key==='ArrowUp'&&r>0){clearFlash();selected-=9;render();e.preventDefault()}
  }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

buildNumpad();
startNew('easy');
</script>
