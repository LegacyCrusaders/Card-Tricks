<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="sudokuG">
<meta name="theme-color" content="#0f0f0f">
<title>sudokuG</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--border:#2e2e2e;--border-strong:#555;
  --text:#e8e8e8;--text-dim:#666;
  --accent:#4a9eff;--accent-bg:rgba(74,158,255,0.12);
  --peer:#1e1e1e;--user:#4a9eff;--error:#ff5a5a;
  --note:#888;--match-note:#ffd700;
  --pair-row:#f0a030;--pair-row-glow:rgba(240,160,48,0.22);
  --pair-col:#30d0a0;--pair-col-glow:rgba(48,208,160,0.22);
  --pair-box:#d060f0;--pair-box-glow:rgba(208,96,240,0.22);
  --tri-row:#ff7a30;--tri-row-glow:rgba(255,122,48,0.22);
  --tri-col:#30b8ff;--tri-col-glow:rgba(48,184,255,0.22);
  --tri-box:#c0e040;--tri-box-glow:rgba(192,224,64,0.22);
  --btn:#222;--btn-active:rgba(74,158,255,0.18);--btn-border:#333;
  --checkpoint:#ff9f43;--checkpoint-bg:rgba(255,159,67,0.15);
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:'Courier New',monospace;overflow:hidden;touch-action:manipulation}

/* ════════════════════════════════════════
   LAYOUT — three modes
   ════════════════════════════════════════ */

/* DESKTOP ≥700px: panel left, grid right */
@media(min-width:700px){
  #app{display:flex;flex-direction:row;align-items:stretch;
    width:100vw;height:100vh;padding:14px;gap:16px}
  #panel{display:flex;flex-direction:column;gap:7px;
    width:300px;flex-shrink:0;overflow-y:auto;overflow-x:hidden}
  #grid-wrap{flex:1;align-self:center;
    --gs:min(calc(100vh - 28px),calc(100vw - 344px));
    width:var(--gs);height:var(--gs);flex-shrink:0}
  .cell{font-size:calc(var(--gs)/9*0.52)}
  .notes-g span{font-size:calc(var(--gs)/9*0.24)}
  #numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;width:100%}
  #numpad button{font-size:20px;padding:10px 0}
  .btn{font-size:13px;padding:9px 6px}
  .row-label{font-size:11px}
  #msg{font-size:12px;min-height:16px}
}

/* PORTRAIT <700px: grid top, controls bottom */
@media(max-width:699px) and (orientation:portrait){
  #app{display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;height:100dvh;padding:5px 4px;gap:3px}
  #grid-wrap{order:1;flex-shrink:0;
    width:min(calc(100vw - 8px),calc(100dvh - 200px));aspect-ratio:1}
  #panel{order:2;display:flex;flex-direction:column;align-items:center;gap:3px;
    width:min(calc(100vw - 8px),480px);flex-shrink:0}
  .cell{font-size:calc(min(calc(100vw - 8px),calc(100dvh - 200px))/9*0.52)}
  .notes-g span{font-size:calc(min(calc(100vw - 8px),calc(100dvh - 200px))/9*0.24)}
  #numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;width:100%}
  #numpad button{font-size:18px;padding:8px 0}
  .btn{font-size:11px;padding:6px 2px}
  .row-label{font-size:9px}
  #msg{font-size:11px;min-height:14px;text-align:center}
}

/* LANDSCAPE mobile: panel left, grid right */
@media(max-width:699px) and (orientation:landscape){
  #app{display:flex;flex-direction:row;align-items:stretch;
    width:100vw;height:100dvh;padding:4px;gap:5px;overflow:hidden}
  #panel{display:flex;flex-direction:column;gap:3px;
    width:44vw;flex-shrink:0;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;padding-right:3px}
  #grid-wrap{flex-shrink:0;
    width:calc(100dvh - 8px);height:calc(100dvh - 8px);
    max-width:54vw;align-self:center}
  .cell{font-size:calc(min(calc(100dvh - 8px),54vw)/9*0.5)}
  .notes-g span{font-size:calc(min(calc(100dvh - 8px),54vw)/9*0.22)}
  #numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;width:100%}
  #numpad button{font-size:13px;padding:6px 0}
  .btn{font-size:10px;padding:5px 3px}
  .row-label{font-size:8px}
  #msg{font-size:10px;min-height:12px}
}

/* ════════════════════════════════════════
   SHARED STYLES
   ════════════════════════════════════════ */
#grid{display:grid;grid-template-columns:repeat(9,1fr);
  width:100%;height:100%;border:2px solid var(--border-strong)}
#top-bar{display:flex;align-items:center;justify-content:space-between;
  width:100%;flex-shrink:0}
#title{font-size:13px;letter-spacing:.18em;color:var(--text-dim);
  text-transform:uppercase;font-weight:700}
#timer{font-size:13px;letter-spacing:.1em;color:var(--text-dim);
  font-variant-numeric:tabular-nums;font-weight:600}
#controls{display:flex;flex-direction:column;gap:inherit;width:100%;flex-shrink:0}
#msg{color:var(--text-dim);text-align:left;flex-shrink:0}

/* Cells */
.cell{border:.5px solid var(--border);display:flex;align-items:center;
  justify-content:center;cursor:pointer;position:relative;
  font-weight:600;color:var(--text);transition:background .08s;
  -webkit-tap-highlight-color:transparent}
.cell:nth-child(3n+1){border-left:1.5px solid var(--border-strong)}
.cell:nth-child(n+1):nth-child(-n+9){border-top:1.5px solid var(--border-strong)}
.cell:nth-child(n+28):nth-child(-n+36){border-top:1.5px solid var(--border-strong)}
.cell:nth-child(n+55):nth-child(-n+63){border-top:1.5px solid var(--border-strong)}
.cell.selected{background:rgba(255,210,0,0.32)!important}
.cell.peer{background:var(--peer)}
.cell.match{background:rgba(255,220,0,0.22)!important}
.cell.user-digit{color:var(--user)}
.cell.error{background:rgba(255,90,90,0.22)!important;color:var(--error)!important}
.cell.tagged-pair-row{box-shadow:inset 0 0 0 2px var(--pair-row);background:var(--pair-row-glow)}
.cell.tagged-pair-col{box-shadow:inset 0 0 0 2px var(--pair-col);background:var(--pair-col-glow)}
.cell.tagged-pair-box{box-shadow:inset 0 0 0 2px var(--pair-box);background:var(--pair-box-glow)}
.cell.tagged-tri-row{box-shadow:inset 0 0 0 2px var(--tri-row);background:var(--tri-row-glow)}
.cell.tagged-tri-col{box-shadow:inset 0 0 0 2px var(--tri-col);background:var(--tri-col-glow)}
.cell.tagged-tri-box{box-shadow:inset 0 0 0 2px var(--tri-box);background:var(--tri-box-glow)}
.cell.hint-pivot{box-shadow:inset 0 0 0 2px #9b6fff;background:rgba(155,111,255,0.18)!important}
.cell.hint-wing{box-shadow:inset 0 0 0 2px #ff6fa0;background:rgba(255,111,160,0.15)!important}

/* Notes grid */
.notes-g{display:grid;grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);width:100%;height:100%;padding:1px}
.notes-g span{display:flex;align-items:center;justify-content:center;
  color:var(--note);font-weight:400;line-height:1}
.notes-g span.pair-note-row{color:var(--pair-row);font-weight:700}
.notes-g span.pair-note-col{color:var(--pair-col);font-weight:700}
.notes-g span.pair-note-box{color:var(--pair-box);font-weight:700}
.notes-g span.tri-note-row{color:var(--tri-row);font-weight:700}
.notes-g span.tri-note-col{color:var(--tri-col);font-weight:700}
.notes-g span.tri-note-box{color:var(--tri-box);font-weight:700}
.notes-g span.match-note{color:var(--match-note);font-weight:700}
.notes-g span.hint-note{color:#9b6fff;font-weight:700}

/* Buttons */
.row-label{letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;
  text-align:center;font-weight:700;width:100%}
.btn-row{display:flex;gap:3px;width:100%}
.btn{background:var(--btn);border:.5px solid var(--btn-border);color:var(--text);
  border-radius:6px;cursor:pointer;font-weight:700;font-family:inherit;
  white-space:nowrap;flex:1;text-align:center;transition:background .1s;
  -webkit-tap-highlight-color:transparent;min-width:0;position:relative}
.btn:active{transform:scale(.94)}
.btn.active{background:var(--btn-active);border-color:var(--accent);color:var(--accent)}
.btn.notes-all-active{background:rgba(74,158,255,0.25);border-color:var(--accent);
  color:var(--accent);font-weight:700}
.btn.tag-pair{border-color:var(--pair-row);color:var(--pair-row)}
.btn.tag-triple{border-color:var(--tri-col);color:var(--tri-col)}
.btn.hint-style{border-color:#9b6fff;color:#9b6fff}
.btn.undo-style{border-color:#888;color:#aaa}
.btn.check-style{border-color:#4caf7a;color:#4caf7a}
.btn.checkpoint-style{border-color:var(--checkpoint);color:var(--checkpoint)}
.btn.checkpoint-style.has-checkpoint{background:var(--checkpoint-bg)}
.btn.restore-style{border-color:var(--checkpoint);color:var(--checkpoint);
  opacity:.4;pointer-events:none}
.btn.restore-style.has-checkpoint{opacity:1;pointer-events:auto}

/* Expand-on-tap: button shows short label, tap expands to show full word */
/* .btn-short = abbreviated; .btn-expanded = full label shown */
.btn .btn-short{display:inline}
.btn .btn-long{display:none;font-size:0.85em}
.btn.expanded .btn-short{display:none}
.btn.expanded .btn-long{display:inline}
.btn.expanded{background:rgba(255,255,255,0.08);z-index:10;
  box-shadow:0 0 0 1px #666;flex:2;transition:flex .15s}

/* Confirm-needed: second tap required, highlighted */
.btn.needs-confirm{outline:2px solid var(--accent);outline-offset:1px}

/* Desktop: show full labels always, no expand needed */
@media(min-width:700px){
  .btn .btn-short{display:none}
  .btn .btn-long{display:inline}
  .btn.expanded{flex:1;box-shadow:none;background:var(--btn)}
}

#numpad{flex-shrink:0}
#numpad button{background:var(--btn);border:.5px solid var(--btn-border);
  color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit;
  font-weight:700;transition:background .1s;-webkit-tap-highlight-color:transparent;
  width:100%}
#numpad button:active{transform:scale(.93);background:var(--accent-bg)}
#numpad button.notes-all-btn{border-color:var(--accent);color:var(--accent);
  background:var(--accent-bg)}

/* Modals */
#modal,#splash,#restore-modal{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
#modal.open,#splash.open,#restore-modal.open{display:flex}
#modal-box,#restore-box{background:#1a1a1a;border:1px solid #444;border-radius:10px;
  padding:20px;text-align:center;width:min(300px,90vw);
  display:flex;flex-direction:column;gap:12px}
#restore-box{border-color:var(--checkpoint)}
#modal-box h3,#restore-box h3{font-size:13px;letter-spacing:.1em;
  color:var(--text-dim);text-transform:uppercase}
#restore-box h3{color:var(--checkpoint)}
#restore-box p{font-size:11px;color:var(--text-dim);line-height:1.5}
.diff-btn{background:#222;border:.5px solid #444;color:var(--text);
  border-radius:6px;padding:10px;font-family:inherit;font-size:13px;cursor:pointer}
.diff-btn:active{transform:scale(.97)}
.diff-btn:hover{background:#2a2a2a}
.diff-btn .sub{font-size:10px;color:var(--text-dim);display:block;margin-top:2px}
#modal-cancel,#restore-cancel{font-size:11px;color:var(--text-dim);
  background:none;border:none;cursor:pointer;font-family:inherit}

/* Splash */
#splash-box{display:flex;flex-direction:column;align-items:center;gap:24px}
#splash-title{font-size:52px;font-weight:700;letter-spacing:.08em;color:var(--accent)}
#splash-sub{font-size:11px;letter-spacing:.2em;color:var(--text-dim);
  text-transform:uppercase;text-align:center}
#splash-tap{font-size:12px;color:var(--text-dim);letter-spacing:.15em;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:200;align-items:center;justify-content:center;flex-direction:column;
  gap:12px;color:var(--text-dim);font-size:12px;letter-spacing:.1em}
#loading-overlay.open{display:flex}
</style>
</head>
<body>
<div id="app">
  <div id="panel">
    <div id="top-bar">
      <div id="title">sudokuG</div>
      <div id="timer">0:00</div>
    </div>
    <div id="controls">
      <div class="row-label">Mode</div>
      <div class="btn-row">
        <button class="btn active" id="btn-digit" onclick="tapBtn(this,()=>{setMode('digit')})"><span class="btn-short">D</span><span class="btn-long">Digit</span></button>
        <button class="btn " id="btn-notes" onclick="tapBtn(this,()=>{cycleNotes()})"><span class="btn-short">N</span><span class="btn-long">Notes</span></button>
        <button class="btn " onclick="tapBtn(this,()=>{eraseCell()})"><span class="btn-short">⌫</span><span class="btn-long">Erase</span></button>
        <button class="btn undo-style" onclick="tapBtn(this,()=>{undo()})"><span class="btn-short">↩</span><span class="btn-long">Undo</span></button>
        <button class="btn check-style" onclick="tapBtn(this,()=>{checkSolution()})"><span class="btn-short">✓</span><span class="btn-long">Check</span></button>
        <button class="btn " onclick="tapBtn(this,()=>{openModal()})"><span class="btn-short">＋</span><span class="btn-long">New</span></button>
      </div>
      <div class="row-label">Auto-notes</div>
      <div class="btn-row">
        <button class="btn " onclick="tapBtn(this,()=>{autoNotes('all')},true)"><span class="btn-short">A</span><span class="btn-long">All</span></button>
        <button class="btn " onclick="tapBtn(this,()=>{autoNotes('peers')},true)"><span class="btn-short">P</span><span class="btn-long">Peers</span></button>
        <button class="btn " onclick="tapBtn(this,()=>{autoNotes('row')},true)"><span class="btn-short">R</span><span class="btn-long">Row</span></button>
        <button class="btn " onclick="tapBtn(this,()=>{autoNotes('col')},true)"><span class="btn-short">C</span><span class="btn-long">Col</span></button>
        <button class="btn " onclick="tapBtn(this,()=>{autoNotes('box')},true)"><span class="btn-short">B</span><span class="btn-long">Box</span></button>
        <button class="btn undo-style" onclick="tapBtn(this,()=>{clearAllNotes()},true)"><span class="btn-short">✕N</span><span class="btn-long">Clr Notes</span></button>
      </div>
      <div class="row-label">Contradiction</div>
      <div class="btn-row">
        <button class="btn checkpoint-style" id="btn-checkpoint" onclick="tapBtn(this,()=>{setCheckpoint()})"><span class="btn-short">📍</span><span class="btn-long">Set Pt</span></button>
        <button class="btn restore-style" id="btn-restore" onclick="tapBtn(this,()=>{openRestoreModal()})"><span class="btn-short">↩C</span><span class="btn-long">Restore</span></button>
        <button class="btn undo-style" onclick="tapBtn(this,()=>{clearCheckpoint()})"><span class="btn-short">✕C</span><span class="btn-long">Clr Pt</span></button>
      </div>
      <div class="row-label">Tag</div>
      <div class="btn-row">
        <button class="btn tag-pair" onclick="tapBtn(this,()=>{tagSet(2)})"><span class="btn-short">+P</span><span class="btn-long">Tag Pair</span></button>
        <button class="btn tag-pair" onclick="tapBtn(this,()=>{untagSet(2)})"><span class="btn-short">−P</span><span class="btn-long">Untag Pair</span></button>
        <button class="btn tag-triple" onclick="tapBtn(this,()=>{tagSet(3)})"><span class="btn-short">+T</span><span class="btn-long">Tag Triple</span></button>
        <button class="btn tag-triple" onclick="tapBtn(this,()=>{untagSet(3)})"><span class="btn-short">−T</span><span class="btn-long">Untag Triple</span></button>
      </div>
      <div class="row-label">Hints</div>
      <div class="btn-row">
        <button class="btn hint-style" onclick="tapBtn(this,()=>{hintFind('pairs')})"><span class="btn-short">2s</span><span class="btn-long">Pairs</span></button>
        <button class="btn hint-style" onclick="tapBtn(this,()=>{hintFind('triples')})"><span class="btn-short">3s</span><span class="btn-long">Triples</span></button>
        <button class="btn hint-style" onclick="tapBtn(this,()=>{hintFind('xwing')})"><span class="btn-short">XW</span><span class="btn-long">X-Wing</span></button>
        <button class="btn hint-style" onclick="tapBtn(this,()=>{hintFind('xywing')})"><span class="btn-short">XY</span><span class="btn-long">XY-Wing</span></button>
        <button class="btn hint-style" onclick="tapBtn(this,()=>{clearHints()})"><span class="btn-short">✕H</span><span class="btn-long">Clr Hints</span></button>
      </div>
    </div>
    <div id="numpad"></div>
    <div id="msg"></div>
  </div>
  <div id="grid-wrap"><div id="grid"></div></div>
</div>

<div id="splash" class="open">
  <div id="splash-box">
    <div id="splash-title">sudokuG</div>
    <div id="splash-sub">smart notes · pair tagging · hints</div>
    <div id="splash-tap">tap to start</div>
  </div>
</div>

<div id="modal">
  <div id="modal-box">
    <h3>New Game</h3>
    <button class="diff-btn" onclick="startNew('easy')">Easy<span class="sub">single candidates only</span></button>
    <button class="diff-btn" onclick="startNew('medium')">Medium<span class="sub">basic logic required</span></button>
    <button class="diff-btn" onclick="startNew('hard')">Hard<span class="sub">advanced techniques</span></button>
    <button class="diff-btn" onclick="startNew('expert')">Expert<span class="sub">fiendish — good luck</span></button>
    <button id="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div id="restore-modal">
  <div id="restore-box">
    <h3>Restore Checkpoint?</h3>
    <p>This will roll back all progress since your checkpoint. Cannot be undone.</p>
    <button class="diff-btn" style="border-color:var(--checkpoint);color:var(--checkpoint)" onclick="confirmRestore()">&#x21A9; Yes, Restore</button>
    <button id="restore-cancel" onclick="closeRestoreModal()">Cancel — keep playing</button>
  </div>
</div>

<div id="loading-overlay"><div>fetching puzzle...</div></div>

<script>
const FALLBACK={
  easy:["530070000600195000098000060800060003400803001700020006060000280000419005000080079","200070038000006070300040600008020700100000003007030400004080009060700000730060001"],
  medium:["000000907000420180000705026100904000050000040000507009920108000034059000507000000","040700000060010070007030014001040500030000090004090200690080100080050060000009020"],
  hard:["000006000059000008200008000045000000003000600000003054000325006000000000000070830","010020300009005040860000000000100008070000050900003000000000081050800700003090020"],
  expert:["800000000003600000070090200060005300004000098000000070000504060050008000000000000","000000010400000000020000000000050407008000300001090000300400200050100000000806000"]
};

async function fetchPuzzle(diff){
  const apiDiff=diff==='expert'?'hard':diff;
  const maxTries=diff==='expert'?6:1;
  let lastFlat;
  for(let t=0;t<maxTries;t++){
    const res=await fetch('https://sugoku.onrender.com/board?difficulty='+apiDiff);
    if(!res.ok)throw new Error('API error');
    const data=await res.json();
    lastFlat=data.board.flat();
    const givens=lastFlat.filter(v=>v!==0).length;
    if(diff!=='expert'||givens<=23)return lastFlat;
  }
  return lastFlat;
}

let PUZZLE=[],mode='digit',selected=null,cells=[],notes=[],digits=[];
let taggedSets=[],history=[],flashError=new Set();
let timerSec=0,timerInterval=null,timerStarted=false;
let hintPivots=new Set(),hintWings=new Set(),hintNotes=new Map();
let notesAllMode=false,checkpoint=null;

const grid=document.getElementById('grid');
const numpad=document.getElementById('numpad');
const msg=document.getElementById('msg');

// Splash
document.getElementById('splash').addEventListener('click',async()=>{
  try{
    if(document.documentElement.requestFullscreen)await document.documentElement.requestFullscreen();
    else if(document.documentElement.webkitRequestFullscreen)await document.documentElement.webkitRequestFullscreen();
  }catch(e){}
  document.getElementById('splash').classList.remove('open');
});

// tapBtn: on mobile, first tap expands button to show full label.
// If needsConfirm=true, expanded state requires a second tap to fire action.
// On desktop (wide screen), always fires immediately.
let expandedBtn=null,expandedAction=null,expandedConfirm=false,expandTimer=null;

function collapseExpanded(){
  if(expandedBtn){
    expandedBtn.classList.remove('expanded','needs-confirm');
    expandedBtn=null;expandedAction=null;expandedConfirm=false;
  }
  clearTimeout(expandTimer);expandTimer=null;
}

function tapBtn(btn,action,needsConfirm=false){
  const isDesktop=window.innerWidth>=700;
  if(isDesktop){action();return;}

  if(expandedBtn===btn){
    // already expanded
    if(needsConfirm){collapseExpanded();action();}
    // non-confirm: already waiting on timer, ignore extra taps
    return;
  }

  collapseExpanded();
  btn.classList.add('expanded');
  expandedBtn=btn;expandedAction=action;expandedConfirm=needsConfirm;

  if(needsConfirm){
    btn.classList.add('needs-confirm');
    showMsg('Tap again to confirm',2000);
  } else {
    expandTimer=setTimeout(()=>{
      const a=expandedAction;
      collapseExpanded();
      a();
    },900);
  }
}

// Click anywhere outside collapses (click fires after touch, avoids race)
document.addEventListener('click',e=>{
  if(expandedBtn&&!expandedBtn.contains(e.target)){collapseExpanded();}
});

function showMsg(t,ms=2500){
  msg.textContent=t;clearTimeout(showMsg._t);
  showMsg._t=setTimeout(()=>msg.textContent='',ms);
}
function rowOf(i){const r=Math.floor(i/9),s=new Set();for(let c=0;c<9;c++)s.add(r*9+c);return s}
function colOf(i){const c=i%9,s=new Set();for(let r=0;r<9;r++)s.add(r*9+c);return s}
function boxOf(i){const r=Math.floor(i/9),c=i%9,br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3,s=new Set();
  for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)s.add((br+dr)*9+(bc+dc));return s}
function peers(i){const s=new Set([...rowOf(i),...colOf(i),...boxOf(i)]);s.delete(i);return s}
function possibleFor(i){const used=new Set();peers(i).forEach(j=>{if(digits[j])used.add(digits[j])});
  const p=new Set();for(let n=1;n<=9;n++)if(!used.has(n))p.add(n);return p}
function clearFlash(){flashError.clear()}
function sees(a,b){return a!==b&&([...rowOf(a)].includes(b)||[...colOf(a)].includes(b)||[...boxOf(a)].includes(b))}
function combinations(arr,k){if(k===0)return[[]];if(arr.length<k)return[];
  const[first,...rest]=arr;return[...combinations(rest,k-1).map(c=>[first,...c]),...combinations(rest,k)]}

function startTimer(){clearInterval(timerInterval);timerInterval=null;timerSec=0;timerStarted=false;updateTimerDisplay()}
function startTimerOnce(){if(timerStarted)return;timerStarted=true;timerInterval=setInterval(()=>{timerSec++;updateTimerDisplay()},1000)}
function stopTimer(){clearInterval(timerInterval);timerInterval=null}
function updateTimerDisplay(){const m=Math.floor(timerSec/60),s=String(timerSec%60).padStart(2,'0');
  document.getElementById('timer').textContent=m+':'+s}

function snapshot(){
  history.push({digits:[...digits],notes:notes.map(s=>new Set(s)),taggedSets:JSON.parse(JSON.stringify(taggedSets))});
  if(history.length>200)history.shift();
}
function undo(){
  if(!history.length){showMsg('Nothing to undo');return}
  clearFlash();const s=history.pop();
  digits=[...s.digits];notes=s.notes.map(n=>new Set(n));taggedSets=s.taggedSets;render();
}

// Checkpoint
function updateCheckpointUI(){
  const has=checkpoint!==null;
  document.getElementById('btn-checkpoint').classList.toggle('has-checkpoint',has);
  document.getElementById('btn-restore').classList.toggle('has-checkpoint',has);
}
function setCheckpoint(){
  checkpoint={digits:[...digits],notes:notes.map(s=>new Set(s)),
    taggedSets:JSON.parse(JSON.stringify(taggedSets)),timerSec};
  updateCheckpointUI();showMsg('📍 Checkpoint set',2500);
}
function openRestoreModal(){
  if(!checkpoint){showMsg('No checkpoint set');return}
  document.getElementById('restore-modal').classList.add('open');
}
function closeRestoreModal(){document.getElementById('restore-modal').classList.remove('open')}
function confirmRestore(){
  closeRestoreModal();
  clearFlash();
  digits=[...checkpoint.digits];notes=checkpoint.notes.map(s=>new Set(s));
  taggedSets=JSON.parse(JSON.stringify(checkpoint.taggedSets));
  timerSec=checkpoint.timerSec;updateTimerDisplay();
  showMsg('↩ Restored to checkpoint',2500);render();
}
function clearCheckpoint(){checkpoint=null;updateCheckpointUI();showMsg('Checkpoint cleared')}

// Mode cycling
function cycleNotes(){
  if(mode==='digit')setMode('notes');
  else if(mode==='notes')setMode('notes-all');
  else setMode('digit');
}
function setMode(m){
  mode=m;notesAllMode=m==='notes-all';
  document.getElementById('btn-digit').classList.toggle('active',m==='digit');
  const nb=document.getElementById('btn-notes');
  nb.classList.toggle('active',m==='notes');
  nb.classList.toggle('notes-all-active',m==='notes-all');
  nb.textContent=m==='notes-all'?'N*':'N';
  [...numpad.querySelectorAll('button')].forEach(b=>b.classList.toggle('notes-all-btn',notesAllMode));
  if(m==='notes-all')showMsg('Notes-All: marks digit in every valid cell',3000);
}

function isTagged(i){return taggedSets.some(t=>t.indices.includes(i))}
function pruneNoteFromPeers(i,n){peers(i).forEach(j=>{if(!isTagged(j))notes[j].delete(n)})}
function isImpossible(i,n){return[...peers(i)].some(j=>digits[j]===n)}

function inputNum(n){
  clearFlash();startTimerOnce();
  if(notesAllMode){
    snapshot();let count=0;
    for(let i=0;i<81;i++){
      if(PUZZLE[i]||digits[i]||isTagged(i))continue;
      if(!isImpossible(i,n)){notes[i].add(n);count++;}
    }
    showMsg('Marked '+n+' as candidate in '+count+' cells');render();return;
  }
  if(selected===null||PUZZLE[selected])return;
  if(mode==='digit'){
    snapshot();
    const placing=digits[selected]!==n?n:0;
    digits[selected]=placing;notes[selected].clear();
    if(placing){
      pruneNoteFromPeers(selected,placing);
      [...peers(selected)].forEach(j=>{if(digits[j]===placing)flashError.add(j)});
      if([...peers(selected)].some(j=>digits[j]===placing))flashError.add(selected);
    }
  } else {
    if(!notes[selected].has(n)&&isImpossible(selected,n)){
      flashError.add(selected);showMsg('Already in this row, column, or box');render();return;
    }
    snapshot();
    notes[selected].has(n)?notes[selected].delete(n):notes[selected].add(n);
  }
  render();
}

function eraseCell(){
  if(selected===null||PUZZLE[selected])return;
  clearFlash();startTimerOnce();snapshot();digits[selected]=0;notes[selected].clear();render();
}
function selectCell(i){clearFlash();selected=i;render()}

function autoNotes(scope){
  let targets;
  if(scope==='all')targets=[...Array(81).keys()];
  else if(scope==='row')targets=selected!==null?[...rowOf(selected)]:[];
  else if(scope==='col')targets=selected!==null?[...colOf(selected)]:[];
  else if(scope==='box')targets=selected!==null?[...boxOf(selected)]:[];
  else if(scope==='peers')targets=selected!==null?[...peers(selected)]:[];
  if(!targets.length){showMsg('Select a cell first');return}
  clearFlash();startTimerOnce();snapshot();
  targets.forEach(i=>{if(isTagged(i)||PUZZLE[i]||digits[i])return;notes[i]=possibleFor(i)});
  render();
}

function clearAllNotes(){
  clearFlash();startTimerOnce();snapshot();
  for(let i=0;i<81;i++)notes[i].clear();
  showMsg('All notes cleared');render();
}

function tagSet(size){
  if(selected===null){showMsg('Select a cell first');return}
  const n=notes[selected];
  if(size===2){
    if(n.size!==2){showMsg('Cell needs exactly 2 notes for a pair');return}
    const[a,b]=[...n];let partner=null,gType=null;
    for(const[groupFn,gt] of [[rowOf,'row'],[colOf,'col'],[boxOf,'box']]){
      for(const j of groupFn(selected)){
        if(j===selected)continue;
        if(notes[j].size===2&&notes[j].has(a)&&notes[j].has(b)){partner=j;gType=gt;break}
      }
      if(partner!==null)break;
    }
    if(partner===null){showMsg('No matching pair in same row/col/box');return}
    clearFlash();startTimerOnce();snapshot();
    taggedSets.push({size:2,groupType:gType,indices:[selected,partner]});
    showMsg('Pair tagged ('+gType+')');render();
  } else {
    if(n.size<1||n.size>3){showMsg('Cell must have 1-3 notes for a triple');return}
    let found=false;
    for(const[groupFn,gt] of [[rowOf,'row'],[colOf,'col'],[boxOf,'box']]){
      const grp=[...groupFn(selected)].filter(j=>j!==selected&&!digits[j]&&!PUZZLE[j]&&notes[j].size>=1&&notes[j].size<=3);
      for(const[p1,p2] of combinations(grp,2)){
        const union=new Set([...n,...notes[p1],...notes[p2]]);
        if(union.size===3){
          clearFlash();startTimerOnce();snapshot();
          taggedSets.push({size:3,groupType:gt,indices:[selected,p1,p2]});
          showMsg('Triple tagged ('+gt+')');render();found=true;break;
        }
      }
      if(found)break;
    }
    if(!found)showMsg('No matching triple in same row/col/box');
  }
}

function untagSet(size){
  if(selected===null){showMsg('Select a cell first');return}
  const idx=taggedSets.findIndex(t=>t.size===size&&t.indices.includes(selected));
  if(idx===-1){showMsg('Cell is not part of a tagged '+(size===2?'pair':'triple'));return}
  clearFlash();startTimerOnce();snapshot();taggedSets.splice(idx,1);render();
}

function tagClass(i){
  for(const t of taggedSets){if(t.indices.includes(i))return 'tagged-'+(t.size===2?'pair':'tri')+'-'+t.groupType}
  return '';
}
function noteTagClass(i){
  for(const t of taggedSets){if(t.indices.includes(i))return(t.size===2?'pair':'tri')+'-note-'+t.groupType}
  return '';
}

function checkSolution(){
  if(digits.some(d=>!d)){showMsg('Puzzle not complete yet');return}
  const valid=digits.every((d,i)=>d&&![...peers(i)].some(j=>digits[j]===d));
  if(valid){stopTimer();const m=Math.floor(timerSec/60),s=String(timerSec%60).padStart(2,'0');
    showMsg('Solved! Time: '+m+':'+s,6000);}
  else showMsg('Something is wrong — check red cells');
}

function render(){
  const peerSet=selected!==null?peers(selected):new Set();
  const selVal=selected!==null?digits[selected]:0;
  cells.forEach((el,i)=>{
    let cls='cell';
    if(PUZZLE[i])cls+=' given';
    else if(digits[i])cls+=' user-digit';
    if(flashError.has(i))cls+=' error';
    else if(i===selected)cls+=' selected';
    else if(peerSet.has(i))cls+=' peer';
    if(!flashError.has(i)&&selVal&&digits[i]===selVal&&i!==selected)cls+=' match';
    const tc=tagClass(i);if(tc)cls+=' '+tc;
    if(hintPivots.has(i))cls+=' hint-pivot';
    if(hintWings.has(i))cls+=' hint-wing';
    el.className=cls;
    const d=digits[i],nt=notes[i];
    if(d){el.innerHTML=d;}
    else if(nt.size>0){
      const ng=document.createElement('div');ng.className='notes-g';
      const ntc=noteTagClass(i);
      for(let k=1;k<=9;k++){
        const sp=document.createElement('span');
        if(nt.has(k)){
          sp.textContent=k;
          if(ntc)sp.className=ntc;
          else if(hintNotes.has(i)&&hintNotes.get(i).has(k))sp.className='hint-note';
          else if(selVal&&k===selVal)sp.className='match-note';
        }
        ng.appendChild(sp);
      }
      el.innerHTML='';el.appendChild(ng);
    } else el.innerHTML='';
  });
}

function buildGrid(){
  grid.innerHTML='';cells=[];
  for(let i=0;i<81;i++){
    const el=document.createElement('div');
    el.className='cell'+(PUZZLE[i]?' given':'');
    el.addEventListener('click',()=>selectCell(i));
    grid.appendChild(el);cells.push(el);
  }
  render();
}
function buildNumpad(){
  numpad.innerHTML='';
  for(let n=1;n<=9;n++){
    const b=document.createElement('button');
    b.textContent=n;b.onclick=()=>inputNum(n);
    numpad.appendChild(b);
  }
}

function openModal(){document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}

async function startNew(diff){
  closeModal();document.getElementById('loading-overlay').classList.add('open');
  let puzzleArr;
  try{puzzleArr=await fetchPuzzle(diff);}
  catch(e){
    const bank=FALLBACK[diff];
    puzzleArr=bank[Math.floor(Math.random()*bank.length)].split('').map(Number);
    showMsg('Offline — using local puzzle');
  }
  document.getElementById('loading-overlay').classList.remove('open');
  PUZZLE=[...puzzleArr];digits=[...PUZZLE];
  notes=Array.from({length:81},()=>new Set());
  taggedSets=[];hintPivots=new Set();hintWings=new Set();hintNotes=new Map();
  history=[];selected=null;flashError.clear();
  checkpoint=null;updateCheckpointUI();
  if(mode!=='digit')setMode('digit');
  buildGrid();startTimer();
  showMsg(diff.charAt(0).toUpperCase()+diff.slice(1)+' puzzle loaded');
}

// Hints
function clearHints(){hintPivots.clear();hintWings.clear();hintNotes.clear();render();showMsg('Hints cleared')}
function hintFind(type){
  clearHints();
  if(type==='pairs')findNakedSets(2);
  else if(type==='triples')findNakedSets(3);
  else if(type==='xwing')findXWing();
  else if(type==='xywing')findXYWing();
  render();
}

function findNakedSets(n){
  const groups=[];
  for(let i=0;i<9;i++){
    groups.push([...rowOf(i*9)]);
    groups.push([...colOf(i)]);
    groups.push([...boxOf(Math.floor(i/3)*27+(i%3)*3)]);
  }
  let found=false;
  for(const grp of groups){
    const empties=grp.filter(i=>!digits[i]&&!PUZZLE[i]&&notes[i].size>=2&&notes[i].size<=n);
    for(const combo of combinations(empties,n)){
      const union=new Set(combo.flatMap(i=>[...notes[i]]));
      if(union.size===n){combo.forEach(i=>{hintPivots.add(i);hintNotes.set(i,new Set(union))});found=true;}
    }
  }
  if(!found)showMsg(n===2?'No naked pairs found':'No naked triples found');
  else showMsg((n===2?'Naked pairs':'Naked triples')+' highlighted in purple');
}

function findXWing(){
  let found=false;
  for(let d=1;d<=9;d++){
    const rowCands=[];
    for(let r=0;r<9;r++){
      const cols=[...rowOf(r*9)].filter(i=>!digits[i]&&notes[i].has(d)).map(i=>i%9);
      if(cols.length===2)rowCands.push({r,cols});
    }
    for(let a=0;a<rowCands.length;a++)for(let b=a+1;b<rowCands.length;b++){
      if(rowCands[a].cols[0]===rowCands[b].cols[0]&&rowCands[a].cols[1]===rowCands[b].cols[1]){
        const[c1,c2]=[rowCands[a].cols[0],rowCands[a].cols[1]],[r1,r2]=[rowCands[a].r,rowCands[b].r];
        [[r1,c1],[r1,c2],[r2,c1],[r2,c2]].forEach(([r,c])=>{const idx=r*9+c;hintPivots.add(idx);
          if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)});
        for(let r=0;r<9;r++)if(r!==r1&&r!==r2)[c1,c2].forEach(c=>{const idx=r*9+c;
          if(!digits[idx]&&notes[idx].has(d)){hintWings.add(idx);
            if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)}});
        found=true;
      }
    }
    const colCands=[];
    for(let c=0;c<9;c++){
      const rows=[...colOf(c)].filter(i=>!digits[i]&&notes[i].has(d)).map(i=>Math.floor(i/9));
      if(rows.length===2)colCands.push({c,rows});
    }
    for(let a=0;a<colCands.length;a++)for(let b=a+1;b<colCands.length;b++){
      if(colCands[a].rows[0]===colCands[b].rows[0]&&colCands[a].rows[1]===colCands[b].rows[1]){
        const[r1,r2]=[colCands[a].rows[0],colCands[a].rows[1]],[c1,c2]=[colCands[a].c,colCands[b].c];
        [[r1,c1],[r1,c2],[r2,c1],[r2,c2]].forEach(([r,c])=>{const idx=r*9+c;hintPivots.add(idx);
          if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)});
        for(let c=0;c<9;c++)if(c!==c1&&c!==c2)[r1,r2].forEach(r=>{const idx=r*9+c;
          if(!digits[idx]&&notes[idx].has(d)){hintWings.add(idx);
            if(!hintNotes.has(idx))hintNotes.set(idx,new Set());hintNotes.get(idx).add(d)}});
        found=true;
      }
    }
  }
  if(!found)showMsg('No X-Wings found in notes');
  else showMsg('X-Wing: purple=pattern, pink=eliminations');
}

function findXYWing(){
  const bi=[];
  for(let i=0;i<81;i++)if(!digits[i]&&!PUZZLE[i]&&notes[i].size===2)bi.push(i);
  let found=false;
  for(const pivot of bi){
    const[x,y]=[...notes[pivot]];
    for(const w1 of bi){
      if(w1===pivot||!sees(pivot,w1))continue;
      const w1n=[...notes[w1]];
      if(!w1n.includes(x)&&!w1n.includes(y))continue;
      for(const[shared1,z] of [[x,w1n.find(v=>v!==x)],[y,w1n.find(v=>v!==y)]]){
        if(z===undefined||z===shared1)continue;
        for(const w2 of bi){
          if(w2===pivot||w2===w1||!sees(pivot,w2))continue;
          const other=shared1===x?y:x;
          if(notes[w2].has(other)&&notes[w2].has(z)){
            hintPivots.add(pivot);hintPivots.add(w1);hintPivots.add(w2);
            [pivot,w1,w2].forEach(i=>{if(!hintNotes.has(i))hintNotes.set(i,new Set());
              notes[i].forEach(v=>hintNotes.get(i).add(v))});
            for(let i=0;i<81;i++){
              if(hintPivots.has(i)||digits[i])continue;
              if(sees(w1,i)&&sees(w2,i)&&notes[i].has(z)){hintWings.add(i);
                if(!hintNotes.has(i))hintNotes.set(i,new Set());hintNotes.get(i).add(z)}
            }
            found=true;
          }
        }
      }
    }
  }
  if(!found)showMsg('No XY-Wings found in notes');
  else showMsg('XY-Wing: purple=pattern, pink=eliminations');
}

document.addEventListener('keydown',e=>{
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){undo();return}
  const n=parseInt(e.key);
  if(n>=1&&n<=9){inputNum(n);return}
  if(e.key==='Backspace'||e.key==='Delete'){eraseCell();return}
  if(e.key==='d'||e.key==='D')setMode('digit');
  if(e.key==='n'||e.key==='N')cycleNotes();
  if(selected!==null){
    const r=Math.floor(selected/9),c=selected%9;
    if(e.key==='ArrowRight'&&c<8){clearFlash();selected++;render();e.preventDefault()}
    if(e.key==='ArrowLeft'&&c>0){clearFlash();selected--;render();e.preventDefault()}
    if(e.key==='ArrowDown'&&r<8){clearFlash();selected+=9;render();e.preventDefault()}
    if(e.key==='ArrowUp'&&r>0){clearFlash();selected-=9;render();e.preventDefault()}
  }
});

buildNumpad();
startNew('easy');
</script>
