<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Notes</title>
    <style>
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Samsung One', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #mainApp {
            display: flex;
            width: 100vw; height: 100vh;
            background: #1a1a1a;
            flex-direction: column;
        }

        /* TOP BAR */
        .top-bar {
            background: #2a2a2a;
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #3a3a3a;
            height: 56px;
        }
        .top-bar-left { display: flex; align-items: center; gap: 12px; }
        .top-bar-center {
            display: flex; align-items: center; gap: 20px;
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        .menu-btn, .top-icon-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: transparent; border: none;
            cursor: pointer; transition: background 0.2s;
        }
        .menu-btn:active, .top-icon-btn:active { background: #3a3a3a; }
        .action-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; border-radius: 50%;
            cursor: pointer; transition: background 0.2s;
        }
        .action-btn:active { background: #3a3a3a; }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* CANVAS */
        .canvas-container {
            flex: 1; position: relative;
            background: #1a1a1a; overflow: hidden;
        }
        #drawingCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; cursor: crosshair;
        }
        #textInput {
            position: absolute;
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.4);
            color: #fff;
            font-size: 48px;
            font-family: Arial, sans-serif;
            outline: none;
            padding: 2px 6px;
            min-width: 60px;
            z-index: 500;
            caret-color: #fff;
            display: none;
        }

        /* BOTTOM TOOLBAR */
        .bottom-toolbar {
            background: #2a2a2a; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-top: 1px solid #3a3a3a; height: 64px;
        }
        .tool-group { display: flex; align-items: center; gap: 16px; }
        .tool-btn {
            display: flex; flex-direction: column; align-items: center;
            background: transparent; border: none; cursor: pointer;
            padding: 4px 8px; border-radius: 8px; transition: background 0.2s;
        }
        .tool-btn:active { background: #3a3a3a; }
        .tool-btn.active { background: #3a3a3a; }
        .tool-btn svg { width: 24px; height: 24px; margin-bottom: 2px; }
        .tool-label { font-size: 11px; color: #b0b0b0; }
        .tool-btn.active .tool-label { color: #fff; }
        .mic-btn {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; border: none; border-radius: 50%;
            cursor: pointer; transition: background 0.2s;
        }
        .mic-btn:active { background: #e0e0e0; }
    </style>
</head>
<body>

<div id="mainApp">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="6"  r="2" fill="#fff"/>
                    <circle cx="12" cy="12" r="2" fill="#fff"/>
                    <circle cx="12" cy="18" r="2" fill="#fff"/>
                </svg>
            </button>
        </div>
        <div class="top-bar-center">
            <button class="action-btn" id="undoBtn" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="#fff"/>
                </svg>
            </button>
            <button class="action-btn" id="redoBtn" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z" fill="#fff"/>
                </svg>
            </button>
            <button class="action-btn" id="clearBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="#fff"/>
                </svg>
            </button>
        </div>
        <div class="top-bar-right">
            <button class="top-icon-btn" id="flipMenuBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z" fill="#fff"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-container">
        <canvas id="drawingCanvas"></canvas>
        <input type="text" id="textInput" placeholder="Type here...">
    </div>

    <!-- BOTTOM TOOLBAR -->
    <div class="bottom-toolbar">
        <div class="tool-group">
            <button class="tool-btn active" id="penBtn">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="#fff"/>
                </svg>
                <span class="tool-label">Pen</span>
            </button>
            <button class="tool-btn" id="eraserBtn">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 01-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0zM4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l3.53-3.53-4.95-4.95-4.95 4.95z" fill="#b0b0b0"/>
                </svg>
                <span class="tool-label">Eraser</span>
            </button>
            <button class="tool-btn" id="textBtn">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M5 4v3h5.5v12h3V7H19V4z" fill="#b0b0b0"/>
                </svg>
                <span class="tool-label">Text</span>
            </button>
        </div>
        <!-- Dummy mic — no functionality -->
        <button class="mic-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" fill="#000"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" fill="#000"/>
            </svg>
        </button>
    </div>
</div>

<script>
    const canvas = document.getElementById('drawingCanvas');
    const ctx    = canvas.getContext('2d');
    const textInput = document.getElementById('textInput');

    let isDrawing    = false;
    let currentTool  = 'pen';
    let strokes      = [];
    let currentStroke = [];
    let redoStack    = [];

    function initCanvas() {
        canvas.width  = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineCap   = 'round';
        ctx.lineJoin  = 'round';
    }

    function getPosition(e) {
        const rect  = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    function startDrawing(e) {
        if (currentTool === 'text') return;
        isDrawing = true;
        const pos = getPosition(e);
        currentStroke = [{x: pos.x, y: pos.y, tool: currentTool}];
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPosition(e);
        currentStroke.push({x: pos.x, y: pos.y, tool: currentTool});
        ctx.strokeStyle = currentTool === 'pen' ? '#fff' : '#1a1a1a';
        ctx.lineWidth   = currentTool === 'pen' ? 2 : 20;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function stopDrawing() {
        if (!isDrawing) return;
        isDrawing = false;
        if (currentStroke.length) { strokes.push([...currentStroke]); redoStack = []; updateButtons(); }
    }

    canvas.addEventListener('mousedown',  startDrawing);
    canvas.addEventListener('mousemove',  draw);
    canvas.addEventListener('mouseup',    stopDrawing);
    canvas.addEventListener('mouseout',   stopDrawing);
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove',  draw, {passive: false});
    canvas.addEventListener('touchend',   stopDrawing);

    // Tool buttons
    document.getElementById('penBtn').addEventListener('click', () => {
        currentTool = 'pen';
        document.getElementById('penBtn').classList.add('active');
        document.getElementById('eraserBtn').classList.remove('active');
        document.getElementById('textBtn').classList.remove('active');
        canvas.style.cursor = 'crosshair';
        commitTextInput();
    });
    document.getElementById('eraserBtn').addEventListener('click', () => {
        currentTool = 'eraser';
        document.getElementById('eraserBtn').classList.add('active');
        document.getElementById('penBtn').classList.remove('active');
        document.getElementById('textBtn').classList.remove('active');
        canvas.style.cursor = 'pointer';
        commitTextInput();
    });
    document.getElementById('textBtn').addEventListener('click', () => {
        currentTool = 'text';
        document.getElementById('textBtn').classList.add('active');
        document.getElementById('penBtn').classList.remove('active');
        document.getElementById('eraserBtn').classList.remove('active');
        canvas.style.cursor = 'text';
    });

    // Text tool
    canvas.addEventListener('click', (e) => {
        if (currentTool !== 'text') return;
        commitTextInput();
        const rect = canvas.getBoundingClientRect();
        textInput.style.left    = (e.clientX - rect.left) + 'px';
        textInput.style.top     = (e.clientY - rect.top - 20) + 'px';
        textInput.style.display = 'block';
        textInput.value = '';
        textInput.focus();
    });
    canvas.addEventListener('touchend', (e) => {
        if (currentTool !== 'text') return;
        e.preventDefault();
        commitTextInput();
        const rect  = canvas.getBoundingClientRect();
        const touch = e.changedTouches[0];
        textInput.style.left    = (touch.clientX - rect.left) + 'px';
        textInput.style.top     = (touch.clientY - rect.top - 20) + 'px';
        textInput.style.display = 'block';
        textInput.value = '';
        textInput.focus();
    }, {passive: false});

    textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') commitTextInput(); });
    textInput.addEventListener('blur',    () => setTimeout(commitTextInput, 100));

    function commitTextInput() {
        const text = textInput.value.trim();
        if (text && textInput.style.display !== 'none') {
            const x = parseInt(textInput.style.left) + 6;
            const y = parseInt(textInput.style.top)  + 48;
            ctx.save();
            ctx.font          = '48px Arial';
            ctx.fillStyle     = '#fff';
            ctx.textBaseline  = 'alphabetic';
            ctx.fillText(text, x, y);
            ctx.restore();
            strokes.push([{x, y, tool: 'text', text}]);
            redoStack = [];
            updateButtons();
        }
        textInput.style.display = 'none';
        textInput.value = '';
    }

    // Undo / Redo / Clear
    document.getElementById('undoBtn').addEventListener('click', () => {
        if (strokes.length) { redoStack.push(strokes.pop()); redrawCanvas(); updateButtons(); }
    });
    document.getElementById('redoBtn').addEventListener('click', () => {
        if (redoStack.length) { strokes.push(redoStack.pop()); redrawCanvas(); updateButtons(); }
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
        strokes = []; redoStack = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        updateButtons();
    });

    function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokes.forEach(stroke => {
            if (!stroke.length) return;
            if (stroke[0].tool === 'text') {
                ctx.save();
                ctx.font = '48px Arial'; ctx.fillStyle = '#fff'; ctx.textBaseline = 'alphabetic';
                ctx.fillText(stroke[0].text, stroke[0].x, stroke[0].y);
                ctx.restore();
            } else {
                ctx.beginPath(); ctx.moveTo(stroke[0].x, stroke[0].y);
                ctx.strokeStyle = stroke[0].tool === 'pen' ? '#fff' : '#1a1a1a';
                ctx.lineWidth   = stroke[0].tool === 'pen' ? 2 : 20;
                for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
                ctx.stroke();
            }
        });
    }

    function updateButtons() {
        document.getElementById('undoBtn').disabled = strokes.length === 0;
        document.getElementById('redoBtn').disabled = redoStack.length === 0;
    }

    window.addEventListener('resize', () => {
        const saved = [...strokes];
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        strokes = saved; redrawCanvas();
    });

    window.addEventListener('load', initCanvas);
</script>
</body>
</html>
