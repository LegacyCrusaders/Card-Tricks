<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YuGiOh Card Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #e8d5a3;
    font-family: Georgia, serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    color: #c9a227;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 24px;
  }

  .controls {
    max-width: 900px;
    margin: 0 auto 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: #1a1a1a;
    border: 1px solid #5a3a0a;
    color: #e8d5a3;
    font-family: Georgia, serif;
    font-size: 1rem;
    padding: 10px 14px;
    border-radius: 3px;
    outline: none;
  }
  input:focus { border-color: #c9a227; }
  input::placeholder { color: #5a4a2a; }

  .btn {
    background: linear-gradient(135deg, #c9a227, #7a5a10);
    color: #0a0804;
    border: none;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-dl { background: linear-gradient(135deg, #2a6a2a, #1a3a1a); color: #8aea8a; }

  #status {
    text-align: center;
    font-style: italic;
    color: #8a7a5a;
    margin-bottom: 14px;
    min-height: 1.4em;
  }
  #status.error { color: #c0392b; }

  .card-outer {
    display: none;
    justify-content: center;
    margin-bottom: 20px;
  }
  .card-outer.visible { display: flex; }

  /* Card is rendered at 1.6x the real YGO size (421x614) for readability */
  .ygo-card {
    width: 674px;
    height: 982px;
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 50px rgba(0,0,0,0.9), 0 0 0 3px #8a6a20;
    flex-shrink: 0;
    font-family: Georgia, serif;
  }

  /* Frame colours */
  .fr-normal   { background: linear-gradient(160deg,#d4a95c,#a06820); }
  .fr-effect   { background: linear-gradient(160deg,#c8733a,#883010); }
  .fr-fusion   { background: linear-gradient(160deg,#7a5aaa,#4a2a7a); }
  .fr-ritual   { background: linear-gradient(160deg,#4a6aaa,#1a3a7a); }
  .fr-synchro  { background: linear-gradient(160deg,#d8d8d8,#888); }
  .fr-xyz      { background: linear-gradient(160deg,#2a2a2a,#050505); }
  .fr-link     { background: linear-gradient(160deg,#1a3a5a,#081525); }
  .fr-spell    { background: linear-gradient(160deg,#1a5a4a,#082520); }
  .fr-trap     { background: linear-gradient(160deg,#7a2a4a,#400818); }
  .fr-pendulum { background: linear-gradient(160deg,#3a7a3a 0%,#2a5aaa 50%,#7a5aaa 100%); }

  /* Sheen overlay */
  .ygo-card::after {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(160deg,rgba(255,255,255,.1) 0%,transparent 55%,rgba(0,0,0,.2) 100%);
    pointer-events:none;
    z-index:20;
    border-radius:18px;
  }

  .inner-border {
    position:absolute;
    inset:10px;
    border:2px solid rgba(255,255,255,.3);
    border-radius:10px;
    pointer-events:none;
    z-index:21;
  }

  /* Header */
  .c-header {
    position:absolute;
    top:20px; left:22px; right:22px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    z-index:5;
  }

  .c-name {
    font-family:'Cinzel',serif;
    font-size:22px;
    font-weight:900;
    color:#0a0804;
    line-height:1.15;
    max-width:440px;
    letter-spacing:.5px;
    text-shadow:0 1px 2px rgba(255,255,255,.35);
  }
  .fr-xyz .c-name,.fr-link .c-name { color:#f0e8d0; text-shadow:0 1px 3px rgba(0,0,0,.7); }

  .c-attr {
    font-family:'Cinzel',serif;
    font-size:14px;
    font-weight:700;
    color:#0a0804;
    background:rgba(255,255,255,.28);
    border-radius:4px;
    padding:3px 8px;
    white-space:nowrap;
    align-self:center;
  }
  .fr-xyz .c-attr,.fr-link .c-attr { color:#f0e8d0; background:rgba(0,0,0,.35); }

  /* Art box */
  .c-art {
    position:absolute;
    top:60px; left:26px; right:26px;
    height:330px;
    background:rgba(0,0,0,.25);
    border:2px solid rgba(255,255,255,.25);
    border-radius:4px;
    overflow:hidden;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .c-art img { width:100%; height:100%; object-fit:cover; }
  .c-art-placeholder { color:rgba(255,255,255,.3); font-size:13px; font-style:italic; }

  /* Pendulum scale badges */
  .pend-scale-left,.pend-scale-right {
    position:absolute;
    width:44px; height:44px;
    background:rgba(0,0,0,.55);
    border:2px solid rgba(255,255,255,.4);
    border-radius:50%;
    display:none;
    align-items:center;
    justify-content:center;
    font-family:'Cinzel',serif;
    font-size:20px;
    font-weight:700;
    color:#f0e8d0;
    z-index:6;
  }
  .pend-scale-left  { left:26px; }
  .pend-scale-right { right:26px; }

  /* Level/Rank row */
  .c-level {
    position:absolute;
    left:26px; right:26px;
    display:flex;
    align-items:center;
    gap:4px;
    z-index:5;
  }

  .star {
    color:#f0c020;
    font-size:24px;
    line-height:1;
    text-shadow:0 0 5px rgba(240,192,0,.7);
  }
  .fr-xyz .star { color:#c8a8f8; }

  /* Type line */
  .c-type {
    position:absolute;
    left:26px; right:26px;
    font-family:'Cinzel',serif;
    font-size:14px;
    font-weight:600;
    color:#0a0804;
    background:rgba(255,255,255,.18);
    border-radius:3px;
    padding:3px 8px;
    z-index:5;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .fr-xyz .c-type,.fr-link .c-type,.fr-spell .c-type,.fr-trap .c-type { color:#f0e8d0; }

  /* Pendulum effect text */
  .c-pend-text {
    display:none;
    position:absolute;
    left:26px; right:26px;
    background:rgba(255,248,220,.9);
    border-radius:3px;
    padding:8px 10px;
    z-index:5;
    font-size:14px;
    color:#1a1008;
    line-height:1.55;
    overflow:hidden;
  }

  /* Main text area */
  .c-text-area {
    position:absolute;
    left:26px; right:26px;
    background:rgba(255,248,220,.92);
    border-radius:3px;
    padding:10px 12px;
    z-index:5;
    overflow:hidden;
    bottom:84px;
  }

  .c-text {
    font-family:Georgia,serif;
    font-size:15px;
    color:#1a1008;
    line-height:1.6;
  }

  /* Stats row */
  .c-stats {
    position:absolute;
    bottom:40px; left:26px; right:26px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:20px;
    z-index:5;
  }

  .stat-item {
    font-family:'Cinzel',serif;
    font-size:18px;
    font-weight:700;
    color:#0a0804;
    display:flex;
    align-items:baseline;
    gap:3px;
  }
  .stat-item .label {
    font-size:13px;
    font-weight:400;
    opacity:.75;
  }
  .fr-xyz .stat-item,.fr-link .stat-item { color:#f0e8d0; }

  /* Card ID */
  .c-id {
    position:absolute;
    bottom:16px; right:26px;
    font-family:'Cinzel',serif;
    font-size:11px;
    color:rgba(10,8,4,.4);
    z-index:5;
  }
  .fr-xyz .c-id,.fr-link .c-id { color:rgba(240,232,208,.35); }

  /* Download row */
  .dl-row {
    display:none;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-top:6px;
  }
  .dl-row.visible { display:flex; }
</style>
</head>
<body>

<h1>⬡ YuGiOh Card Generator ⬡</h1>

<div class="controls">
  <input type="text" id="cardInput" placeholder="Card name or passcode — press Enter or click Look Up" />
  <button class="btn" id="lookupBtn" onclick="lookupCard()">LOOK UP</button>
</div>

<div id="status"></div>

<div class="card-outer" id="cardOuter">
  <div class="ygo-card fr-normal" id="yugiohCard">
    <div class="inner-border"></div>

    <div class="c-header">
      <div class="c-name" id="cName">Card Name</div>
      <div class="c-attr" id="cAttr"></div>
    </div>

    <div class="c-art" id="cArt">
      <div class="c-art-placeholder">Card art appears here</div>
    </div>

    <div class="pend-scale-left"  id="pScaleL"></div>
    <div class="pend-scale-right" id="pScaleR"></div>

    <div class="c-level" id="cLevel"></div>
    <div class="c-type"  id="cType">[ ? ]</div>

    <div class="c-pend-text" id="cPendText"></div>

    <div class="c-text-area" id="cTextArea">
      <div class="c-text" id="cDesc">—</div>
    </div>

    <div class="c-stats" id="cStats"></div>
    <div class="c-id"   id="cId"></div>
  </div>
</div>

<div class="dl-row" id="dlRow">
  <button class="btn btn-dl" onclick="downloadCard(1)">⬇ Download 1× (674px)</button>
  <button class="btn btn-dl" onclick="downloadCard(2)">⬇ Download 2× (1348px)</button>
  <button class="btn btn-dl" onclick="downloadCard(3)">⬇ Download 3× (2022px)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

document.getElementById('cardInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupCard();
});

function frameClass(card) {
  const t = (card.type || '').toLowerCase();
  const f = (card.frameType || '').toLowerCase();
  if (f.includes('pendulum')) return 'pendulum';
  if (f === 'spell' || t.includes('spell card')) return 'spell';
  if (f === 'trap'  || t.includes('trap card'))  return 'trap';
  if (f.includes('fusion')  || t.includes('fusion'))  return 'fusion';
  if (f.includes('ritual')  || t.includes('ritual'))  return 'ritual';
  if (f.includes('synchro') || t.includes('synchro')) return 'synchro';
  if (f.includes('xyz')     || t.includes('xyz'))     return 'xyz';
  if (f.includes('link')    || t.includes('link'))    return 'link';
  if (t.includes('effect')) return 'effect';
  return 'normal';
}

async function lookupCard() {
  const input = document.getElementById('cardInput').value.trim();
  if (!input) return;

  const btn    = document.getElementById('lookupBtn');
  const status = document.getElementById('status');
  const outer  = document.getElementById('cardOuter');
  const dlRow  = document.getElementById('dlRow');

  btn.disabled = true;
  outer.classList.remove('visible');
  dlRow.classList.remove('visible');
  status.className = '';
  status.textContent = 'Searching the card database…';

  try {
    const isNum = /^\d+$/.test(input);
    const url = isNum
      ? `https://db.ygoprodeck.com/api/v7/cardinfo.php?id=${encodeURIComponent(input)}`
      : `https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(input)}`;

    const res  = await fetch(url);
    const data = await res.json();

    if (data.error || !data.data?.length) {
      status.className = 'error';
      status.textContent = 'Card not found. Try the exact name or passcode number.';
      return;
    }

    renderCard(data.data[0]);
    status.textContent = '';
    outer.classList.add('visible');
    dlRow.classList.add('visible');

  } catch(err) {
    status.className = 'error';
    status.textContent = 'Network error — save this file and open it locally in your browser.';
  } finally {
    btn.disabled = false;
  }
}

function renderCard(card) {
  const el     = document.getElementById('yugiohCard');
  const fr     = frameClass(card);
  const isPend = fr === 'pendulum';
  const t      = card.type || '';

  // Frame
  el.className = `ygo-card fr-${fr}`;

  // Name
  document.getElementById('cName').textContent = card.name;

  // Attribute / card category badge
  const attr = card.attribute
    ? card.attribute
    : t.includes('Spell') ? 'SPELL'
    : t.includes('Trap')  ? 'TRAP'
    : '';
  const attrEl = document.getElementById('cAttr');
  attrEl.textContent    = attr;
  attrEl.style.display  = attr ? '' : 'none';

  // Art image — use full-size image
  const artEl  = document.getElementById('cArt');
  const imgUrl = card.card_images?.[0]?.image_url || card.card_images?.[0]?.image_url_small;
  artEl.style.height = isPend ? '380px' : '330px';
  artEl.innerHTML = imgUrl
    ? `<img src="${imgUrl}" crossorigin="anonymous" alt="Card art" />`
    : `<div class="c-art-placeholder">No art available</div>`;

  // Pendulum scale badges
  const pL = document.getElementById('pScaleL');
  const pR = document.getElementById('pScaleR');
  const scaleTop = isPend ? (60 + 380 + 6) + 'px' : '0';
  if (isPend && card.scale !== undefined) {
    pL.textContent = card.scale;
    pR.textContent = card.scale;
    pL.style.display = pR.style.display = 'flex';
    pL.style.top = pR.style.top = scaleTop;
  } else {
    pL.style.display = pR.style.display = 'none';
  }

  // Level / Rank / Link
  const levelEl = document.getElementById('cLevel');
  const lvl = card.level  ?? 0;
  const lnk = card.linkval ?? 0;

  // Position level row below art
  const artBottom = 60 + parseInt(artEl.style.height);
  levelEl.style.top = (artBottom + (isPend ? 54 : 6)) + 'px';

  if (lnk) {
    levelEl.innerHTML = `<span style="font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#f0e8d0;">LINK-${lnk}</span>`;
  } else if (lvl && fr !== 'spell' && fr !== 'trap') {
    const starChar = fr === 'xyz' ? '✦' : '★';
    levelEl.innerHTML = Array(lvl).fill(`<span class="star">${starChar}</span>`).join('');
  } else {
    levelEl.innerHTML = '';
  }

  // Type line — just below level
  const typeEl = document.getElementById('cType');
  const typeParts = [];
  if (card.race) typeParts.push(card.race);
  ['Fusion','Ritual','Synchro','Xyz','Link','Pendulum','Flip','Toon','Spirit','Union','Gemini','Tuner','Effect','Normal']
    .forEach(k => { if (t.includes(k)) typeParts.push(k); });
  if (t.includes('Spell Card')) typeParts.push('Spell Card');
  if (t.includes('Trap Card'))  typeParts.push('Trap Card');
  typeEl.textContent = '[ ' + typeParts.join(' / ') + ' ]';
  const typeLevelHeight = (lvl || lnk) ? 32 : 0;
  typeEl.style.top = (artBottom + (isPend ? 54 : 6) + typeLevelHeight) + 'px';

  // Pendulum text box
  const pendEl = document.getElementById('cPendText');
  const typeBottom = artBottom + (isPend ? 54 : 6) + typeLevelHeight + 28;
  if (isPend && card.pend_desc) {
    pendEl.style.display = 'block';
    pendEl.style.top     = typeBottom + 'px';
    pendEl.style.height  = '120px';
    pendEl.textContent   = card.pend_desc;
  } else {
    pendEl.style.display = 'none';
  }

  // Main text area
  const textAreaEl = document.getElementById('cTextArea');
  const textTop = isPend && card.pend_desc ? typeBottom + 126 : typeBottom;
  textAreaEl.style.top = textTop + 'px';

  // For pendulums, desc contains monster effect; for others the full card text
  document.getElementById('cDesc').textContent = card.desc || '';

  // Stats (ATK / DEF / LINK)
  const statsEl = document.getElementById('cStats');
  const parts = [];
  if (card.atk !== undefined) {
    parts.push({ label:'ATK/', val: card.atk === -1 ? '?' : card.atk });
  }
  if (card.def !== undefined && !lnk) {
    parts.push({ label:'DEF/', val: card.def === -1 ? '?' : card.def });
  }
  if (lnk) {
    parts.push({ label:'LINK-', val: lnk });
  }
  statsEl.innerHTML = parts.map(s =>
    `<div class="stat-item"><span class="label">${s.label}</span>${s.val}</div>`
  ).join('');

  // Passcode
  document.getElementById('cId').textContent = card.id || '';
}

async function downloadCard(scale) {
  const card = document.getElementById('yugiohCard');
  const canvas = await html2canvas(card, {
    scale,
    useCORS: true,
    allowTaint: true,
    backgroundColor: null,
    logging: false
  });
  const a = document.createElement('a');
  a.download = `yugioh_card_${scale}x.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
